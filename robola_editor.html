<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robola Local Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #e0e0e0;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 300px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            overflow-y: auto;
            padding: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff6b6b;
        }
        .status-indicator.connected {
            background: #51cf66;
        }
        .viewer {
            flex: 1;
            background: #000;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .control-panel {
            background: #2d2d30;
            border-top: 1px solid #3e3e42;
            padding: 15px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }
        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        button:hover {
            background: #005a9e;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #858585;
            margin-bottom: 10px;
            border-bottom: 1px solid #3e3e42;
            padding-bottom: 5px;
        }
        .control-group {
            margin-bottom: 12px;
        }
        .control-label {
            font-size: 11px;
            margin-bottom: 4px;
            display: block;
            color: #cccccc;
        }
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            background: #3c3c3c;
            border: 1px solid #555;
            color: #e0e0e0;
            padding: 6px 8px;
            border-radius: 3px;
            font-size: 11px;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        .joint-control {
            background: #1e1e1e;
            padding: 8px;
            border-radius: 3px;
            margin-bottom: 8px;
            border-left: 3px solid #007acc;
        }
        .joint-control-label {
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .joint-value {
            font-size: 10px;
            color: #858585;
        }
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
            font-size: 11px;
            display: none;
        }
        .message.error {
            background: #5a2a2a;
            color: #ff6b6b;
            display: block;
        }
        .message.success {
            background: #2a5a3a;
            color: #51cf66;
            display: block;
        }
        .message.info {
            background: #2a3a5a;
            color: #74c0fc;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="section">
                <div class="section-title">Connection</div>
                <div class="control-group">
                    <label class="control-label">Server Address</label>
                    <input type="text" id="serverUrl" value="ws://localhost:9527/ws" placeholder="ws://localhost:9527/ws">
                </div>
                <button onclick="connectToServer()" style="width: 100%;">Connect</button>
            </div>

            <div class="section">
                <div class="section-title">Model</div>
                <div id="modelInfo" class="message info">Not connected</div>
                <div id="modelDetails"></div>
            </div>

            <div class="section">
                <div class="section-title">File</div>
                <div class="control-group">
                    <label class="control-label">Load XML File</label>
                    <input type="text" id="xmlPath" placeholder="/path/to/model.xml">
                </div>
                <button onclick="loadXmlFile()" style="width: 100%;">Load</button>
            </div>

            <div class="section">
                <div class="section-title">Simulation</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button onclick="startSimulation()">Play</button>
                    <button onclick="pauseSimulation()">Pause</button>
                    <button onclick="stepSimulation()">Step</button>
                    <button onclick="resetSimulation()">Reset</button>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Joint Controls</div>
                <div id="jointControls"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <h1>Robola Local Editor</h1>
                <div class="status">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="statusText">Disconnected</span>
                </div>
            </div>
            <div class="viewer">
                <canvas id="canvas"></canvas>
            </div>
            <div class="control-panel">
                <button onclick="document.getElementById('xmlPath').focus()">Load Model</button>
                <button onclick="saveModel()">Save Model</button>
                <button onclick="resetView()">Reset View</button>
                <span style="padding: 8px; font-size: 12px;" id="fpsCounter">FPS: 0</span>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let modelData = null;
        let simulationRunning = false;
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let lastFrameTime = Date.now();
        let frameCount = 0;

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function updateStatus(connected, message) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            
            if (connected) {
                indicator.classList.add('connected');
                text.textContent = message || 'Connected';
            } else {
                indicator.classList.remove('connected');
                text.textContent = message || 'Disconnected';
            }
        }

        function showMessage(message, type = 'info') {
            const msgEl = document.getElementById('modelInfo');
            msgEl.textContent = message;
            msgEl.className = `message ${type}`;
            setTimeout(() => {
                if (msgEl.classList.contains(type)) {
                    msgEl.className = 'message';
                }
            }, 3000);
        }

        function connectToServer() {
            const url = document.getElementById('serverUrl').value;
            
            if (ws) {
                ws.close();
            }

            try {
                ws = new WebSocket(url);
                
                ws.onopen = () => {
                    updateStatus(true, 'Connected');
                    showMessage('Connected to Robola server', 'success');
                };

                ws.onmessage = (event) => {
                    const message = JSON.parse(event.data);
                    handleServerMessage(message);
                };

                ws.onerror = () => {
                    updateStatus(false, 'Connection error');
                    showMessage('Failed to connect to server', 'error');
                };

                ws.onclose = () => {
                    updateStatus(false, 'Disconnected');
                    showMessage('Disconnected from server', 'info');
                };
            } catch (error) {
                showMessage('Invalid server URL', 'error');
            }
        }

        function handleServerMessage(message) {
            if (message.type === 'model_loaded') {
                showMessage(`Model loaded: ${message.model_info?.name || 'Unknown'}`, 'success');
                updateModelInfo(message.model_info);
            } else if (message.type === 'model_data') {
                modelData = message;
                updateModelDisplay();
            } else if (message.type === 'error') {
                showMessage(message.message, 'error');
            }
        }

        function updateModelInfo(info) {
            const details = document.getElementById('modelDetails');
            if (info) {
                details.innerHTML = `
                    <div class="control-group">
                        <label class="control-label">Name:</label>
                        <div style="font-size: 11px; color: #cccccc;">${info.name || 'Unknown'}</div>
                    </div>
                    <div class="control-group">
                        <label class="control-label">File:</label>
                        <div style="font-size: 11px; color: #cccccc; word-break: break-all;">${info.file || 'Unknown'}</div>
                    </div>
                `;
            }
        }

        function updateModelDisplay() {
            // Simple visualization - draw a representation of the model
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw a simple grid
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Draw model info
            ctx.fillStyle = '#51cf66';
            ctx.font = 'bold 16px monospace';
            ctx.fillText('Model Loaded', 20, 40);
            
            if (modelData) {
                ctx.font = '12px monospace';
                ctx.fillStyle = '#cccccc';
                let y = 80;
                if (modelData.model_info) {
                    ctx.fillText(`Name: ${modelData.model_info.name}`, 20, y);
                    y += 25;
                }
            }

            // Animation frame
            frameCount++;
            const now = Date.now();
            if (now - lastFrameTime >= 1000) {
                document.getElementById('fpsCounter').textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFrameTime = now;
            }
        }

        function loadXmlFile() {
            const path = document.getElementById('xmlPath').value;
            if (!path) {
                showMessage('Please enter a file path', 'error');
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'load_xml',
                    xml_file: path
                }));
                showMessage(`Loading: ${path}`, 'info');
            } else {
                showMessage('Not connected to server', 'error');
            }
        }

        function startSimulation() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'start_simulation' }));
                simulationRunning = true;
            }
        }

        function pauseSimulation() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'pause_simulation' }));
                simulationRunning = false;
            }
        }

        function stepSimulation() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'step_simulation' }));
            }
        }

        function resetSimulation() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'reset_simulation' }));
                simulationRunning = false;
            }
        }

        function saveModel() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                showMessage('Saving model...', 'info');
                ws.send(JSON.stringify({ type: 'save_model' }));
            } else {
                showMessage('Not connected to server', 'error');
            }
        }

        function resetView() {
            // Reset camera/view
            updateModelDisplay();
        }

        // Auto-connect on load
        window.addEventListener('load', () => {
            // You can auto-connect here if desired
            // connectToServer();
        });

        // Handle Enter key in XML path input
        document.getElementById('xmlPath').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadXmlFile();
            }
        });

        // Animation loop
        function animate() {
            updateModelDisplay();
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
